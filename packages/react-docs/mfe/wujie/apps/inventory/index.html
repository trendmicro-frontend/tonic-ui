<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endpoint inventory</title>
    <style>
      /* Pass a definite height from the (Wujie-sized) body down to #app-root so
         the inventory wrapper's `height:100%` resolves against a real height
         instead of collapsing to auto. */
      html,
      body {
        height: 100%;
        margin: 0;
      }
      #app-root {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
